<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARM64 Sandbox — Live</title>
<style>
:root {
  --bg: #0d1117;
  --surface: #161b22;
  --surface2: #21262d;
  --border: #30363d;
  --text: #c9d1d9;
  --muted: #6e7681;
  --blue: #58a6ff;
  --green: #3fb950;
  --yellow: #e3b341;
  --orange: #f0883e;
  --purple: #bc8cff;
  --red: #f85149;
  --teal: #39d4c8;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', 'Consolas', 'Monaco', monospace;
  font-size: 12px;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 10px 16px;
  display: flex;
  align-items: center;
  gap: 16px;
  flex-shrink: 0;
}
header h1 { font-size: 14px; font-weight: 600; color: var(--text); letter-spacing: 0.02em; }
header h1 span { color: var(--blue); }
.status-indicator { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--muted); }
.dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); transition: background 0.3s; flex-shrink: 0; }
.dot.connected { background: var(--green); box-shadow: 0 0 6px var(--green); }
.dot.disconnected { background: var(--red); }
.dot.connecting { background: var(--yellow); animation: pulse 1s infinite; }
@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
.controls { display: flex; align-items: center; gap: 8px; margin-left: auto; }
.stat { font-size: 11px; color: var(--muted); padding: 3px 10px; background: var(--surface2); border-radius: 4px; border: 1px solid var(--border); white-space: nowrap; }
.stat strong { color: var(--text); }
button {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: inherit;
  font-size: 11px;
  padding: 3px 10px;
  border-radius: 4px;
  cursor: pointer;
  transition: background 0.15s;
}
button:hover { background: var(--border); }
label { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--muted); cursor: pointer; user-select: none; }
input[type=checkbox] { cursor: pointer; accent-color: var(--blue); }
.filter-bar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 5px 16px;
  display: flex;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
}
.filter-bar span { font-size: 11px; color: var(--muted); margin-right: 2px; }
.filter-btn {
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 10px;
  opacity: 0.45;
  transition: opacity 0.15s, background 0.15s;
  white-space: nowrap;
}
.filter-btn.active { opacity: 1; }
.filter-btn.lvl-info { border-color: var(--blue); color: var(--blue); background: transparent; }
.filter-btn.lvl-info.active { background: rgba(88,166,255,0.1); }
.filter-btn.lvl-warn { border-color: var(--yellow); color: var(--yellow); background: transparent; }
.filter-btn.lvl-warn.active { background: rgba(227,179,65,0.1); }
.filter-btn.lvl-error { border-color: var(--red); color: var(--red); background: transparent; }
.filter-btn.lvl-error.active { background: rgba(248,81,73,0.1); }
.col-header {
  display: grid;
  grid-template-columns: 86px 46px 148px 86px 130px 1fr;
  gap: 0;
  padding: 4px 16px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  font-size: 10px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  flex-shrink: 0;
}
.col-header span { padding: 0 4px; }
#feed { flex: 1; overflow-y: auto; overflow-x: hidden; position: relative; }
#feed::-webkit-scrollbar { width: 6px; }
#feed::-webkit-scrollbar-track { background: transparent; }
#feed::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
.event {
  display: grid;
  grid-template-columns: 86px 46px 148px 86px 130px 1fr;
  padding: 3px 16px;
  border-bottom: 1px solid rgba(48,54,61,0.45);
  align-items: start;
  transition: background 0.1s;
  border-left: 2px solid transparent;
}
.event:hover { background: rgba(22,27,34,0.9); }
.event.level-warn { border-left-color: rgba(227,179,65,0.5); }
.event.level-error { border-left-color: rgba(248,81,73,0.6); background: rgba(248,81,73,0.03); }
.event > div { padding: 2px 4px; }
.event-time { color: var(--muted); font-size: 11px; white-space: nowrap; font-variant-numeric: tabular-nums; }
.badge { font-size: 9px; font-weight: 700; padding: 1px 5px; border-radius: 3px; text-transform: uppercase; letter-spacing: 0.05em; white-space: nowrap; display: inline-block; }
.badge-info { background: rgba(88,166,255,0.15); color: var(--blue); }
.badge-warn { background: rgba(227,179,65,0.15); color: var(--yellow); }
.badge-error { background: rgba(248,81,73,0.15); color: var(--red); }
.event-ip { color: var(--green); font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; opacity: 0.85; }
.event-job { color: var(--blue); font-size: 11px; opacity: 0.7; white-space: nowrap; font-variant-numeric: tabular-nums; letter-spacing: 0.02em; }
.kind-badge { font-size: 10px; padding: 1px 7px; border-radius: 3px; white-space: nowrap; display: inline-block; }
.kind-request   { background: rgba(57,212,200,0.12); color: var(--teal); }
.kind-auth      { background: rgba(248,81,73,0.12); color: var(--red); }
.kind-rate      { background: rgba(227,179,65,0.12); color: var(--yellow); }
.kind-compile   { background: rgba(188,140,255,0.12); color: var(--purple); }
.kind-execute   { background: rgba(63,185,80,0.12); color: var(--green); }
.kind-deploy    { background: rgba(240,136,62,0.12); color: var(--orange); }
.kind-git       { background: rgba(227,179,65,0.12); color: var(--yellow); }
.kind-validate  { background: rgba(248,81,73,0.12); color: var(--red); }
.kind-analysis  { background: rgba(188,140,255,0.12); color: var(--purple); }
.kind-default   { background: rgba(110,118,129,0.12); color: var(--muted); }
.event-body { min-width: 0; }
.event-msg { font-size: 12px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.5; }
.event.level-error .event-msg { color: #ffa198; }
.event.level-warn .event-msg { color: #f0c060; }
.event-data { margin-top: 3px; display: none; }
.event-data.open { display: block; }
.event-data pre {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 8px 12px;
  font-size: 11px;
  color: #a8c0c8;
  overflow-x: auto;
  white-space: pre-wrap;
  word-break: break-all;
  max-height: 220px;
  overflow-y: auto;
  line-height: 1.55;
}
.expand-btn {
  font-size: 10px;
  padding: 1px 6px;
  margin-top: 2px;
  color: var(--muted);
  background: transparent;
  border-color: var(--border);
  display: inline-block;
}
.expand-btn:hover { color: var(--text); background: var(--surface2); }
#empty {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  color: var(--muted);
  pointer-events: none;
}
#empty .icon { font-size: 36px; margin-bottom: 10px; opacity: 0.2; }
#empty p { font-size: 13px; opacity: 0.5; }
footer {
  background: var(--surface);
  border-top: 1px solid var(--border);
  padding: 4px 16px;
  font-size: 10px;
  color: var(--muted);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 16px;
}
footer span:last-child { margin-left: auto; }
</style>
</head>
<body>

<header>
  <h1>ARM64 <span>Sandbox</span></h1>
  <div class="status-indicator">
    <div class="dot connecting" id="status-dot"></div>
    <span id="status-text">Connecting…</span>
  </div>
  <div class="controls">
    <div class="stat">Total: <strong id="event-count">0</strong></div>
    <div class="stat">Errors: <strong id="error-count" style="color:var(--red)">0</strong></div>
    <label><input type="checkbox" id="autoscroll" checked> Auto-scroll</label>
    <button id="clear-btn">Clear</button>
  </div>
</header>

<div class="filter-bar">
  <span>Level:</span>
  <button class="filter-btn lvl-info active" data-filter="info">INFO</button>
  <button class="filter-btn lvl-warn active" data-filter="warn">WARN</button>
  <button class="filter-btn lvl-error active" data-filter="error">ERROR</button>
</div>

<div class="col-header">
  <span>Time</span>
  <span>Level</span>
  <span>IP Address</span>
  <span>Job ID</span>
  <span>Kind</span>
  <span>Message / Details</span>
</div>

<div id="feed">
  <div id="empty">
    <div class="icon">◈</div>
    <p>Waiting for events…</p>
  </div>
</div>

<footer>
  <span>ARM64 Sandbox — Live Activity</span>
  <span id="last-event-ts">—</span>
</footer>

<script>
const feed       = document.getElementById('feed');
const emptyEl    = document.getElementById('empty');
const countEl    = document.getElementById('event-count');
const errCountEl = document.getElementById('error-count');
const statusDot  = document.getElementById('status-dot');
const statusText = document.getElementById('status-text');
const lastTsEl   = document.getElementById('last-event-ts');
const autoscrollCb = document.getElementById('autoscroll');

let eventCount = 0;
let errorCount = 0;
const activeFilters = new Set(['info', 'warn', 'error']);

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const f = btn.dataset.filter;
    if (activeFilters.has(f)) { activeFilters.delete(f); btn.classList.remove('active'); }
    else                      { activeFilters.add(f);    btn.classList.add('active'); }
    document.querySelectorAll('.event[data-level]').forEach(row => {
      row.style.display = activeFilters.has(row.dataset.level) ? '' : 'none';
    });
  });
});

document.getElementById('clear-btn').addEventListener('click', () => {
  document.querySelectorAll('.event').forEach(e => e.remove());
  eventCount = 0; errorCount = 0;
  countEl.textContent = '0'; errCountEl.textContent = '0';
  emptyEl.style.display = '';
});

function fmtTime(ts) {
  const d = new Date(ts);
  return d.toLocaleTimeString('en-GB', {hour12:false}) + '.' + String(d.getMilliseconds()).padStart(3,'0');
}

function fmtFullTime(ts) {
  const d = new Date(ts);
  return d.toISOString().replace('T',' ').replace('Z',' UTC');
}

function kindClass(kind) {
  if (kind.startsWith('request'))   return 'kind-request';
  if (kind.startsWith('auth') || kind.includes('unauthorized')) return 'kind-auth';
  if (kind.startsWith('rate'))      return 'kind-rate';
  if (kind.startsWith('compile'))   return 'kind-compile';
  if (kind.startsWith('execute') || kind.startsWith('execution')) return 'kind-execute';
  if (kind.startsWith('deploy'))    return 'kind-deploy';
  if (kind.startsWith('git'))       return 'kind-git';
  if (kind.startsWith('script'))    return 'kind-deploy';
  if (kind.startsWith('valid'))     return 'kind-validate';
  if (kind.startsWith('analy'))     return 'kind-analysis';
  return 'kind-default';
}

function kindLabel(kind) {
  return kind.replace(/_/g, ' ');
}

function hasData(data) {
  return data && typeof data === 'object' && Object.keys(data).length > 0;
}

function fmtData(data) {
  // Format known fields nicely, fall back to JSON
  const lines = [];
  for (const [k, v] of Object.entries(data)) {
    if (k === 'output' || k === 'stdout' || k === 'stderr' || k === 'error') {
      const val = String(v).trim();
      if (val) lines.push(k + ':\n  ' + val.replace(/\n/g, '\n  '));
    } else {
      lines.push(k + ': ' + JSON.stringify(v));
    }
  }
  return lines.join('\n');
}

function esc(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

let uid = 0;
function appendEvent(ev) {
  emptyEl.style.display = 'none';
  eventCount++;
  if (ev.level === 'error') { errorCount++; errCountEl.textContent = errorCount; }
  countEl.textContent = eventCount;
  lastTsEl.textContent = fmtFullTime(ev.ts);

  const row = document.createElement('div');
  row.className = `event level-${ev.level}`;
  row.dataset.level = ev.level;
  if (!activeFilters.has(ev.level)) row.style.display = 'none';

  const jobShort = ev.job_id ? ev.job_id.slice(0, 8) : '—';
  const ipText   = ev.ip    || '—';
  const dataId   = 'evd' + (++uid);
  const showData = hasData(ev.data);

  row.innerHTML =
    `<div class="event-time" title="${esc(fmtFullTime(ev.ts))}">${esc(fmtTime(ev.ts))}</div>` +
    `<div><span class="badge badge-${esc(ev.level)}">${esc(ev.level)}</span></div>` +
    `<div class="event-ip"  title="${esc(ipText)}">${esc(ipText)}</div>` +
    `<div class="event-job" title="${esc(ev.job_id || '')}">${esc(jobShort)}</div>` +
    `<div><span class="kind-badge ${kindClass(ev.kind)}">${esc(kindLabel(ev.kind))}</span></div>` +
    `<div class="event-body">` +
      `<div class="event-msg" title="${esc(ev.msg)}">${esc(ev.msg)}</div>` +
      (showData
        ? `<button class="expand-btn" onclick="toggleData('${dataId}',this)">▸ details</button>` +
          `<div class="event-data" id="${dataId}"><pre>${esc(fmtData(ev.data))}</pre></div>`
        : '') +
    `</div>`;

  feed.appendChild(row);

  if (autoscrollCb.checked && activeFilters.has(ev.level)) {
    row.scrollIntoView({ block: 'end' });
  }
}

function toggleData(id, btn) {
  const el = document.getElementById(id);
  el.classList.toggle('open');
  btn.textContent = el.classList.contains('open') ? '▾ details' : '▸ details';
}

function connect() {
  statusDot.className = 'dot connecting';
  statusText.textContent = 'Connecting…';
  const es = new EventSource('/events');
  es.onopen = () => {
    statusDot.className = 'dot connected';
    statusText.textContent = 'Connected';
  };
  es.onmessage = e => {
    try { appendEvent(JSON.parse(e.data)); }
    catch (err) { console.error('Bad event', err, e.data); }
  };
  es.onerror = () => {
    statusDot.className = 'dot disconnected';
    statusText.textContent = 'Disconnected — retrying in 3s';
    es.close();
    setTimeout(connect, 3000);
  };
}
connect();
</script>
</body>
</html>
